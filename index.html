<!doctype html>
<html lang="en">

<head>
  <!-- Basic -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="color-scheme" content="light dark" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="/integrate18.jpeg" />
  <link rel="apple-touch-icon" href="/integrate18.jpeg" />

  <!-- Primary SEO -->
  <title>Integrate18 | End-to-End IT Solutions, AI, Cloud & Digital Growth</title>
  <meta name="description"
    content="Integrate18 delivers complete IT solutions including website development, mobile apps, custom software, AI solutions, cloud services, branding, SEO, automation, and digital transformation for startups and businesses." />
  <meta name="keywords"
    content="Integrate18, IT solutions, software company, web development, mobile app development, AI solutions, cloud services, SEO services, branding, automation, startup technology partner" />
  <meta name="author" content="Integrate18" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="googlebot" content="index, follow" />
  <link rel="canonical" href="https://integrate18.com/" />

  <!-- Geo SEO -->
  <meta name="geo.region" content="IN-MH" />
  <meta name="geo.placename" content="Pune, Maharashtra, India" />

  <!-- Performance -->
  <link rel="dns-prefetch" href="//www.googletagmanager.com" />
  <link rel="dns-prefetch" href="//www.google-analytics.com" />
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
  <link rel="preconnect" href="https://www.google-analytics.com" crossorigin />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Integrate18" />
  <meta property="og:locale" content="en_IN" />
  <meta property="og:url" content="https://integrate18.com/" />
  <meta property="og:title" content="Integrate18 | End-to-End IT Solutions, AI, Cloud & Digital Growth" />
  <meta property="og:description"
    content="One trusted partner for websites, apps, software, AI, cloud, SEO, branding, and digital growth." />
  <meta property="og:image" content="https://integrate18.com/integrate18.jpeg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Integrate18 | End-to-End IT Solutions, AI, Cloud & Digital Growth" />
  <meta name="twitter:description"
    content="Websites, apps, software, AI, cloud, branding and growth solutions under one roof." />
  <meta name="twitter:image" content="https://integrate18.com/integrate18.jpeg" />

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Integrate18",
        "url": "https://integrate18.com",
        "logo": "https://integrate18.com/integrate18.jpeg",
        "description": "Integrate18 provides end-to-end IT solutions including websites, apps, software, AI, cloud, SEO, branding and automation.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Pune",
          "addressRegion": "Maharashtra",
          "addressCountry": "IN"
        },
        "areaServed": "Worldwide",
        "sameAs": []
      }
    </script>

  <!-- Structured Data: Website -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Integrate18",
        "url": "https://integrate18.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://integrate18.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

  <!-- Google Analytics (replace G-XXXXXXXXXX with your ID) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NMGLNNLJNC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-NMGLNNLJNC');
  </script>

</head>

<body>
  <noscript>Please enable JavaScript to view this website.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
